<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stopwatch</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        #display {
            font-size: 48px;
            margin-bottom: 30px;
            font-weight: bold;
            color: #1e3c72;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        #start {
            background-color: #28a745;
            color: white;
        }

        #start:hover {
            background-color: #218838;
        }

        #stop {
            background-color: #dc3545;
            color: white;
        }

        #stop:hover {
            background-color: #c82333;
        }

        #reset {
            background-color: #ffc107;
            color: black;
        }

        #reset:hover {
            background-color: #e0a800;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 id="display">00:00:00</h2>
        <button id="start">Start</button>
        <button id="stop">Stop</button>
        <button id="reset">Reset</button>
    </div>

    <script src="./stop.js"></script>

</body>
</html>
